services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - music_data:/data
    environment:
      TIMBRE_DATA_DIR: /data
      TIMBRE_PORT: "8080"
      # Switch to postgres by setting these + using the postgres service below:
      # TIMBRE_DB_DRIVER: postgres
      # TIMBRE_DB_DSN: "host=db user=music password=music dbname=music sslmode=disable"
    restart: unless-stopped

  # Optional Postgres (uncomment + update app env to use):
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: music
  #     POSTGRES_PASSWORD: music
  #     POSTGRES_DB: music
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  music_data:
  # pg_data:
